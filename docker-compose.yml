services:
  postgres:
    image: postgres:17-alpine
    container_name: pglg-integration-postgres
    environment:
      POSTGRES_USER: pglg
      POSTGRES_PASSWORD: pglg
      POSTGRES_DB: pglg
    ports:
      - "127.0.0.1:15434:5432"
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "tcp_keepalives_idle=30"
      - "-c"
      - "tcp_keepalives_interval=10"
      - "-c"
      - "tcp_keepalives_count=3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pglg -d pglg"]
      interval: 1s
      timeout: 2s
      retries: 20
